blueprint:
  name: AWTRIX 3 – RSS Feed Headlines
  description: >
    Pushes the latest headlines from an RSS feed sensor to an AWTRIX 3 display
    (Ulanzi TC001 / DIY) as a Custom App over MQTT.


    Choose how many headlines to show before the app advances, whether the icon
    stays fixed on the left or scrolls away with the text, and which icon to use
    (defaults to the orange LaMetric RSS icon **#85** when left blank).


    ──────────────────────────────────────────────────────────────────────────

    SETUP (one-time, before using this blueprint):

    1. Create a REST sensor that fetches & parses your RSS URL. A ready-made
       snippet is provided in `rss_rest_sensor_example.yaml` – paste it into your
       `configuration.yaml` (or a package), set your feed URL, and restart HA.
       This is where the **RSS feed URL is selected**.

    2. On the AWTRIX web UI → *Icons* tab, download icon ID **85** (or whatever
       icon ID you plan to use) so it exists on the display's flash. AWTRIX does
       not auto-download icons by ID at send time.

    3. Create an automation from this blueprint and pick the sensor + device.
       The MQTT topic prefix is read automatically from the selected AWTRIX
       device — no need to type it.

    ──────────────────────────────────────────────────────────────────────────
  domain: automation
  source_url: https://github.com/tubalainen/awtrix3-homeassistant-blueprints
  input:
    awtrix_device:
      name: AWTRIX device(s)
      description: >
        Select your AWTRIX 3 display(s). The MQTT topic prefix is read
        automatically from each device's `device_topic` entity, so you don't
        need to type it. (Requires the AWTRIX device to be auto-discovered via
        MQTT.) You can pick more than one display.
      default: []
      selector:
        device:
          integration: mqtt
          manufacturer: Blueforcer
          model: AWTRIX 3
          multiple: true

    manual_prefix:
      name: Manual MQTT prefix (fallback / advanced)
      description: >
        Optional. Only needed if the device picker above can't find your AWTRIX
        (e.g. it isn't MQTT-discovered). Enter the prefix shown in the AWTRIX
        web UI under *Settings → the MQTT prefix*, with NO trailing slash, e.g.
        `awtrix_b8d61a`. Leave blank if you selected a device above.
      default: ""
      selector:
        text: {}

    app_name:
      name: App name (MQTT topic suffix)
      description: >
        The custom-app name, i.e. the last part of the topic
        `<prefix>/custom/<app_name>`. Must be unique per app on the display.
      default: rss
      selector:
        text: {}

    feed_sensor:
      name: RSS feed sensor
      description: >
        The REST sensor that holds your parsed feed (see SETUP step 1). Its
        `item` attribute must contain the list of RSS items.
      selector:
        entity:
          domain: sensor

    num_headlines:
      name: Number of headlines
      description: How many headlines to show before the app advances to the next one.
      default: 5
      selector:
        number:
          min: 1
          max: 20
          step: 1
          mode: slider

    icon_behavior:
      name: Icon behaviour while scrolling
      description: >
        Controls AWTRIX `pushIcon`. "Fixed on the left" keeps the icon in place
        while text scrolls past it. The "scroll away" options let the text
        overwrite / push the icon off-screen.
      default: "0"
      selector:
        select:
          mode: dropdown
          options:
            - label: Keep icon fixed on the left (icon stays, text scrolls beside it)
              value: "0"
            - label: Scroll icon away with the text – does not reappear
              value: "1"
            - label: Scroll icon away with the text – reappears each loop
              value: "2"

    icon_code:
      name: Icon (optional)
      description: >
        AWTRIX icon ID (e.g. `85`), an icon filename without extension, or an
        8×8 Base64 JPG. Leave blank to use the default orange RSS icon **#85**.
      default: ""
      selector:
        text: {}

    text_color:
      name: Text colour
      description: Hex colour for the headline text.
      default: "#FFFFFF"
      selector:
        text: {}

    separator:
      name: Headline separator
      description: Text placed between headlines when they are joined together.
      default: "   •   "
      selector:
        text: {}

    refresh_minutes:
      name: Safety re-push interval (minutes)
      description: >
        Besides updating whenever the feed sensor changes, the app is re-sent on
        this interval so it survives an AWTRIX reboot. Set higher to reduce MQTT
        traffic.
      default: 15
      selector:
        number:
          min: 1
          max: 240
          step: 1
          mode: box

    auto_remove:
      name: Auto-remove the app when updates stop
      description: >
        When ON, the app self-deletes from the display if it stops being updated
        (e.g. Home Assistant goes offline). The expiry is set to 3× the safety
        re-push interval, so it never disappears during normal operation. When
        OFF, the app stays on the display until you remove it manually.
      default: true
      selector:
        boolean: {}

# ───────────────────────────────────────────────────────────────────────────

mode: restart
max_exceeded: silent

variables:
  device_ids: !input awtrix_device
  manual_prefix: !input manual_prefix
  app_name: !input app_name
  feed_sensor: !input feed_sensor
  num: !input num_headlines
  push_icon: !input icon_behavior
  icon_code: !input icon_code
  text_color: !input text_color
  sep: !input separator
  default_icon: "85"
  refresh_min: !input refresh_minutes
  auto_remove: !input auto_remove

  # Build the list of MQTT topics: <prefix>/custom/<app_name>, where the prefix
  # of each selected device is read from its `device_topic` entity. A manual
  # prefix (if given) is added as well.
  topics: >-
    {%- set ns = namespace(t=[]) -%}
    {%- for device_id in (device_ids if device_ids is iterable and device_ids is not string else [device_ids]) -%}
      {%- set ents = device_entities(device_id) | select('search','device_topic') | list -%}
      {%- if ents | count > 0 -%}
        {%- set p = states(ents[0]) | string | replace(' ','') -%}
        {%- if p not in ['unknown','unavailable',''] -%}
          {%- set ns.t = ns.t + [ p ~ '/custom/' ~ app_name ] -%}
        {%- endif -%}
      {%- endif -%}
    {%- endfor -%}
    {%- if manual_prefix | string | trim -%}
      {%- set ns.t = ns.t + [ (manual_prefix | string | trim) ~ '/custom/' ~ app_name ] -%}
    {%- endif -%}
    {{ ns.t }}

  # Build the AWTRIX custom-app JSON payload once, reused for every topic.
  payload: >-
    {%- set ns = namespace(titles=[]) -%}
    {%- set raw = state_attr(feed_sensor, 'item') -%}
    {%- if raw is mapping -%}{%- set raw = [raw] -%}{%- endif -%}
    {%- if raw is string or raw is none -%}{%- set raw = [] -%}{%- endif -%}
    {%- for it in raw[: (num | int)] -%}
      {%- set t = it.title if (it is mapping and it.title is defined) else it -%}
      {%- if t is mapping -%}{%- set t = t.get('#text', '') -%}{%- endif -%}
      {%- set t = t | string | striptags | trim -%}
      {%- if t -%}{%- set ns.titles = ns.titles + [t] -%}{%- endif -%}
    {%- endfor -%}
    {%- set body = ns.titles | join(sep) -%}
    {%- set icon = icon_code if (icon_code | string | trim) else default_icon -%}
    {%- set lifetime = (refresh_min | int) * 180 if auto_remove else 0 -%}
    {{
      {
        "text": (body if body else "No headlines"),
        "icon": icon,
        "pushIcon": (push_icon | int),
        "color": text_color,
        "repeat": 1,
        "scrollSpeed": 100,
        "lifetime": lifetime,
        "lifetimeMode": 0
      } | to_json
    }}

triggers:
  - trigger: state
    entity_id: !input feed_sensor
  - trigger: homeassistant
    event: start
  - trigger: time_pattern
    minutes: !input refresh_minutes

actions:
  - repeat:
      for_each: "{{ topics }}"
      sequence:
        - action: mqtt.publish
          data:
            qos: 0
            retain: false
            topic: "{{ repeat.item }}"
            payload: "{{ payload }}"
